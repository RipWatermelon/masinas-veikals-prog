<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Pārdošanas Vietne</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background_Div">

    <hr style="width: 100%;"></hr>

    <div class="CarListings" id="listings-section">
        <h1>Auto Sludinājumi</h1>

        <table id="listings-table">
            <thead>
            <tr>
                <th>ID</th><th>Tips</th><th>Apdrošināts</th><th>Stāvoklis</th><th>Gads</th><th>Zīmols</th><th>Attēls</th><th>Noņemt</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="showAddListingForm()">Pievienot Sludinājumu</button>
        <div id="add-listing-form" class="adding_Area">
            <input placeholder="Transportlīdzekļa Tips" id="vehicleType">
            <label for="isInsured">Apdrošināts</label>
            <input type="checkbox" id="isInsured">
            <input placeholder="Stāvoklis" id="condition">
            <input placeholder="Gads" type="number" id="year">
            <input placeholder="Zīmols" id="brand">
            <input placeholder="Attēla Saite" id="imageLink">
            <button onclick="addListing()">Iesniegt</button>
            <button onclick="hideAddListingForm()">Atcelt</button>
        </div>

    </div>


    <div class="Orders" id="orders-section">
        <h1>Pasūtījumi</h1>

        <table id="orders-table">
            <thead>
            <tr>
                <th>ID</th><th>Tālrunis</th><th>Adrese</th><th>Sludinājuma ID</th><th>Noņemt</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="showAddOrderForm()">Pievienot Pasūtījumu</button>
        <div id="add-order-form" class="adding_Area">
            <input placeholder="Tālruņa Nr" id="phoneNo">
            <input placeholder="Adrese" id="address">
            <input placeholder="Sludinājuma ID" type="number" id="orderListingID">
            <button onclick="addOrder()">Iesniegt</button>
            <button onclick="hideAddOrderForm()">Atcelt</button>
        </div>

    </div>

    <hr style="width: 100%;"></hr>
</div>


<script src="script.js"></script>
</body>
</html>
